            <div style="background: #fff; padding: 20px; border-radius: 10px; border-left: 5px solid #C05800; text-align: left;">
              <h3 style="color: #43B069; margin-top: 0;">Countable vs Uncountable Nouns</h3>
              <p>Los sustantivos <b>Contables</b> se pueden contar por unidad (apples, cars) y pueden ser plurales. Los <b>Incontables</b> no se pueden contar individualmente (water, sugar, money) y no tienen forma plural.</p>
              
              <h4 style="color: #C05800;">Quantifiers:</h4>
              <ul style="line-height: 1.6;">
                <li><b>Much:</b> Se usa con incontables en preguntas y negaciones <i>(How much milk?)</i>.</li>
                <li><b>Many:</b> Se usa con contables en preguntas y negaciones <i>(How many apples?)</i>.</li>
                <li><b>A little / Little:</b> "Un poco de", se usa con incontables <i>(A little sugar)</i>.</li>
                <li><b>A few / Few:</b> "Unos pocos", se usa con contables <i>(A few friends)</i>.</li>
                <li><b>Some:</b> "Algunos/Algo de", para oraciones afirmativas u ofrecimientos. Sirve para ambos <i>(Some apples, some water)</i>.</li>
                <li><b>Any:</b> "Ningún/Nada de", para preguntas y negaciones. Sirve para ambos <i>(Any apples?, I don't have any water)</i>.</li>
                <li><b>A lot of:</b> "Mucho(s)", mayormente en oraciones afirmativas. Sirve para ambos <i>(A lot of cars, a lot of money)</i>.</li>
              </ul>
