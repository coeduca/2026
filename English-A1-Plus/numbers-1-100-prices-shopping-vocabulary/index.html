            <h3>Numbers: -teen vs. -ty</h3>
            <p>Be careful with pronunciation and spelling! <strong>Thirteen (13)</strong> ends in <em>-teen</em> and has the stress at the end, while <strong>Thirty (30)</strong> ends in <em>-ty</em> and has the stress at the beginning.</p>
            <ul>
              <li>14 = Fourteen vs. 40 = Forty</li>

            </ul>
            <h3>Currency & Prices</h3>
            <p>We use <strong>dollar(s)</strong> for main currency units and <strong>cent(s)</strong> for fractions ($1.00 = 100 cents).</p>
            <p><strong>Grammar:</strong> Use <em>How much is...?</em> for singular items and <em>How much are...?</em> for plural items.</p>
            <ul>
              <li>"How much <strong>is</strong> this shirt?" -> "It <strong>is</strong> $25.00."</li>
