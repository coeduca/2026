          html: '<div style="font-size: 1.1rem; line-height: 1.5;"><p>Los <strong>possessive adjectives</strong> (adjetivos posesivos) se utilizan para indicar que algo pertenece a alguien. En inglés, el adjetivo posesivo depende del poseedor, no del objeto poseído.</p><table style="width: 100%; border-collapse: collapse; margin-top: 10px;"><tr style="background-color: rgba(255,255,255,0.3);"><th>Subject</th><th>Possessive</th><th>Example (Family)</th></tr><tr><td><strong>I</strong></td><td>my</td><td><strong>My</strong> mother is kind. (Mi madre)</td></tr><tr><td><strong>You</strong></td><td>your</td><td>Is that <strong>your</strong> brother? (Tu hermano)</td></tr><tr><td><strong>He</strong></td><td>his</td><td><strong>His</strong> father is a doctor. (Su padre de él)</td></tr><tr><td><strong>She</strong></td><td>her</td><td><strong>Her</strong> sister sings well. (Su hermana de ella)</td></tr><tr><td><strong>It</strong></td><td>its</td><td>The dog loves <strong>its</strong> toy. (Su juguete del perro)</td></tr><tr><td><strong>We</strong></td><td>our</td><td><strong>Our</strong> grandparents are old. (Nuestros abuelos)</td></tr><tr><td><strong>They</strong></td><td>their</td><td><strong>Their</strong> cousins live here. (Sus primos de ellos)</td></tr></table></div>'
